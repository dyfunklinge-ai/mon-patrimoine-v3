<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- App background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060810"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>

    <!-- Cyan ambient glow top-left -->
    <radialGradient id="glowCyan" cx="30%" cy="28%" r="52%">
      <stop offset="0%"   stop-color="#4af4e8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4af4e8" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet ambient glow bottom-right -->
    <radialGradient id="glowViolet" cx="75%" cy="78%" r="48%">
      <stop offset="0%"   stop-color="#9b7af0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9b7af0" stop-opacity="0"/>
    </radialGradient>

    <!-- Diamond stroke gradient -->
    <linearGradient id="diamStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4af4e8"/>
      <stop offset="55%"  stop-color="#7dd8f0"/>
      <stop offset="100%" stop-color="#9b7af0"/>
    </linearGradient>

    <!-- Diamond inner fill top half -->
    <linearGradient id="diamTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4af4e8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4af4e8" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Diamond inner fill bottom half -->
    <linearGradient id="diamBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9b7af0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9b7af0" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Bar gradient cyan -->
    <linearGradient id="bCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4af4e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00c8bd" stop-opacity="0.40"/>
    </linearGradient>

    <!-- Bar gradient violet -->
    <linearGradient id="bViolet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9b7af0" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#6c4de0" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Bar gradient green -->
    <linearGradient id="bGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3ddc97" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#1aad6e" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Trend line glow filter -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot glow filter -->
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded rect clip for icon shape -->
    <clipPath id="iconShape">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- Top shimmer mask -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- ═══ ICON SHAPE CLIP ═══ -->
  <g clip-path="url(#iconShape)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Ambient glows -->
    <rect width="512" height="512" fill="url(#glowCyan)"/>
    <rect width="512" height="512" fill="url(#glowViolet)"/>

    <!-- Subtle grid (top half fade) -->
    <g stroke="#4af4e8" stroke-width="0.6" opacity="0.05">
      <line x1="0"   y1="128" x2="512" y2="128"/>
      <line x1="0"   y1="192" x2="512" y2="192"/>
      <line x1="0"   y1="256" x2="512" y2="256"/>
      <line x1="128" y1="0"   x2="128" y2="288"/>
      <line x1="192" y1="0"   x2="192" y2="288"/>
      <line x1="256" y1="0"   x2="256" y2="288"/>
      <line x1="320" y1="0"   x2="320" y2="288"/>
      <line x1="384" y1="0"   x2="384" y2="288"/>
    </g>

    <!-- ═══ DIAMOND ◈ — centred in upper 55% ═══ -->
    <!-- Outer halo ring -->
    <polygon
      points="256,62 390,196 256,330 122,196"
      fill="none"
      stroke="url(#diamStroke)"
      stroke-width="1"
      opacity="0.18"/>

    <!-- Top facet fill -->
    <polygon points="256,82 336,196 256,196 176,196" fill="url(#diamTop)"/>
    <!-- Bottom facet fill -->
    <polygon points="256,310 336,196 256,196 176,196" fill="url(#diamBot)"/>

    <!-- Cross-lines inside diamond -->
    <line x1="256" y1="108" x2="256" y2="284"
      stroke="url(#diamStroke)" stroke-width="1" opacity="0.30"/>
    <line x1="182" y1="196" x2="330" y2="196"
      stroke="url(#diamStroke)" stroke-width="1" opacity="0.30"/>

    <!-- Diamond main stroke — GLOW pass -->
    <polygon
      points="256,82 336,196 256,310 176,196"
      fill="none"
      stroke="url(#diamStroke)"
      stroke-width="6"
      stroke-linejoin="round"
      filter="url(#lineGlow)"
      opacity="0.65"/>

    <!-- Diamond main stroke — crisp pass -->
    <polygon
      points="256,82 336,196 256,310 176,196"
      fill="none"
      stroke="url(#diamStroke)"
      stroke-width="2.5"
      stroke-linejoin="round"/>

    <!-- Corner accent dots -->
    <circle cx="256" cy="82"  r="4.5" fill="#4af4e8" filter="url(#dotGlow)" opacity="0.95"/>
    <circle cx="336" cy="196" r="4.5" fill="#4af4e8" filter="url(#dotGlow)" opacity="0.95"/>
    <circle cx="256" cy="310" r="4.5" fill="#9b7af0" filter="url(#dotGlow)" opacity="0.95"/>
    <circle cx="176" cy="196" r="4.5" fill="#9b7af0" filter="url(#dotGlow)" opacity="0.95"/>

    <!-- ═══ CHART BARS — bottom 38% ═══ -->
    <!-- Baseline -->
    <line x1="72" y1="456" x2="440" y2="456"
      stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Bar 1 — green, medium -->
    <rect x="86"  y="380" width="44" height="76" rx="6" fill="url(#bGreen)"  opacity="0.88"/>
    <rect x="86"  y="380" width="44" height="5"  rx="2.5" fill="#3ddc97"/>

    <!-- Bar 2 — cyan, tallest -->
    <rect x="148" y="340" width="44" height="116" rx="6" fill="url(#bCyan)"   opacity="0.92"/>
    <rect x="148" y="340" width="44" height="5"   rx="2.5" fill="#4af4e8"/>

    <!-- Bar 3 — violet, mid-tall -->
    <rect x="210" y="362" width="44" height="94"  rx="6" fill="url(#bViolet)" opacity="0.88"/>
    <rect x="210" y="362" width="44" height="5"   rx="2.5" fill="#9b7af0"/>

    <!-- Bar 4 — cyan, mid -->
    <rect x="272" y="394" width="44" height="62"  rx="6" fill="url(#bCyan)"   opacity="0.72"/>
    <rect x="272" y="394" width="44" height="5"   rx="2.5" fill="#4af4e8" opacity="0.85"/>

    <!-- Bar 5 — green, shorter -->
    <rect x="334" y="410" width="44" height="46"  rx="6" fill="url(#bGreen)"  opacity="0.65"/>
    <rect x="334" y="410" width="44" height="5"   rx="2.5" fill="#3ddc97" opacity="0.80"/>

    <!-- Bar 6 — violet, short -->
    <rect x="396" y="424" width="44" height="32"  rx="6" fill="url(#bViolet)" opacity="0.55"/>
    <rect x="396" y="424" width="44" height="5"   rx="2.5" fill="#9b7af0" opacity="0.70"/>

    <!-- Trend line — GLOW pass -->
    <polyline
      points="108,376  170,338  232,358  294,390  356,406  418,420"
      fill="none"
      stroke="#4af4e8"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#lineGlow)"
      opacity="0.55"/>

    <!-- Trend line — crisp pass -->
    <polyline
      points="108,376  170,338  232,358  294,390  356,406  418,420"
      fill="none"
      stroke="#4af4e8"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Trend dots -->
    <circle cx="108" cy="376" r="4" fill="#4af4e8" filter="url(#dotGlow)"/>
    <circle cx="170" cy="338" r="4" fill="#4af4e8" filter="url(#dotGlow)"/>
    <circle cx="232" cy="358" r="4" fill="#4af4e8" filter="url(#dotGlow)"/>
    <circle cx="294" cy="390" r="3.5" fill="#4af4e8" opacity="0.80"/>
    <circle cx="356" cy="406" r="3.5" fill="#4af4e8" opacity="0.70"/>
    <circle cx="418" cy="420" r="3"   fill="#4af4e8" opacity="0.55"/>

    <!-- Top-left shimmer highlight -->
    <rect width="512" height="512" fill="url(#shimmer)"/>

    <!-- Inner border glow -->
    <rect width="512" height="512" rx="112" ry="112"
      fill="none"
      stroke="rgba(74,244,232,0.14)"
      stroke-width="2"/>

  </g>
</svg>
